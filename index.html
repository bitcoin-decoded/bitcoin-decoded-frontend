<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      /* Blocking and before the first paint: every file is prerendered dark,
         so a light reader would watch it repaint. Hiding is undone by
         ThemeProvider, or by the timeout if the bundle never runs. */
      (function () {
        var root = document.documentElement;
        var theme = "dark";
        try {
          if (localStorage.getItem("theme") === "light") theme = "light";
        } catch (e) {}
        root.dataset.theme = theme;
        if (theme === "light") {
          root.dataset.themePending = "";
          setTimeout(function () {
            delete root.dataset.themePending;
          }, 3000);
        }
      })();
    </script>
    <!-- No title or description here: src/Seo renders them per route. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cutive+Mono&family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;0,7..72,700;1,7..72,400;1,7..72,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
